name: build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  system-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            meson \
            ninja-build \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses-dev \
            libcppunit-dev \
            liblua5.4-dev

      - name: Configure meson
        run: |
          meson setup build \
            -Dlua=enabled \
            --wrap-mode=nofallback

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

  wrap-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build tools only
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            meson \
            ninja-build \
            pkg-config

      - name: Configure meson
        run: |
          meson setup build \
            -Dncurses=disabled \
            -Dtests=disabled \
            -Dlua=enabled \
            --wrap-mode=default

      - name: Build
        run: meson compile -C build
